<!DOCTYPE html>
<html lang="nb">
<head>
    <meta charset="utf-8">
    <title>Cleanzone | Rent har fått en ny betydning</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link href="css/style.css" rel="stylesheet" type="text/css">
    <style>
        /* 1. GLOBAL 75% ZOOM FIX */
        html {
            background-color: #000;
            overflow-x: hidden;
            height: 100%;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            zoom: 0.75; 
            -moz-transform: scale(0.75); 
            -moz-transform-origin: 0 0;
            width: 133.33% !important; 
            min-height: 133.33vh;
            font-family: sans-serif;
        }

        /* 2. VISIBILITY & OVERRIDES */
        .cleanzone-body, .page-wrapper, section, .section, div, h1, h2, h3, p, img {
            opacity: 1 !important;
            visibility: visible !important;
        }

        /* Hero Video Fullscreen */
        .hero-video {
            position: relative;
            height: 100vh;
            width: 100%;
            overflow: hidden;
            display: flex !important;
            align-items: center;
            justify-content: center;
            background-color: #000;
        }
        video {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        /* Navbar & Logo */
        nav, .cleanzone-navbar-white {
            position: absolute;
            top: 0; width: 100%; padding: 40px 80px;
            z-index: 10; box-sizing: border-box;
            background: transparent !important;
        }
        .logo-svg-embed-white { width: 200px !important; }

        /* Content spacing for zoomed view */
        .hero-text-centering-bottom {
            position: absolute;
            bottom: 10%;
            width: 100%;
            text-align: center;
            z-index: 5;
            color: #fff;
        }

        /* Cleanup Wayback UI */
        #wm-ipp-base, .wm-rip, #wm-ipp-print, .wayback-chrome { display: none !important; }
    </style>
</head>
<body class="cleanzone-body">

    <div class="page-wrapper">
        
        <div class="hero-video">
            <video autoplay loop muted playsinline>
                <source src="video/hero.mp4" type="video/mp4">
            </video>
            
            <nav class="cleanzone-navbar-white">
                <img src="img/66fc02b0897b4839d4162d10_Cleanzone_hvit.svg" style="width: 200px;" alt="Cleanzone">
            </nav>

            <div class="hero-text-centering-bottom">
                <h1 style="font-size: 6rem; font-weight: 800; text-transform: uppercase; margin-bottom: 20px; color: #fff;">
                    Rent har fått en<br>ny betydning.
                </h1>
                <p style="font-size: 1.5rem; max-width: 800px; margin: 0 auto; opacity: 0.9; color: #fff;">
                    Ved hjelp av ozon skaper vi vann som renser like effektivt som tradisjonelle kjemikalier.
                </p>
            </div>
        </div>

        <div class="main-content-container">
            <section class="testimonial-section">
                </section>
        </div>

    </div>

    <script>
        // Copy the entire body content from the archive file and place it here 
        // using the browser's memory to avoid manual pasting errors
        document.addEventListener("DOMContentLoaded", function() {
            // Fix all Images to local /img folder
            document.querySelectorAll('img').forEach(img => {
                let src = img.getAttribute('src');
                if (src && (src.includes('website-files.com') || src.includes('archive.org'))) {
                    let fileName = src.split('/').pop().split('?')[0];
                    img.src = 'img/' + fileName;
                }
            });

            // Fix all Background Videos
            document.querySelectorAll('source').forEach(source => {
                if (source.src.includes('transcode.mp4') || source.src.includes('archive.org')) {
                    source.src = 'video/hero.mp4';
                }
            });

            // Fix Webflow attributes
            document.querySelectorAll('.w-background-video').forEach(vid => {
                vid.setAttribute('data-video-urls', 'video/hero.mp4');
            });
            
            // Remove any Wayback links from anchors to keep it a mirror
            document.querySelectorAll('a').forEach(a => {
                let href = a.getAttribute('href');
                if (href && href.includes('web.archive.org')) {
                    a.href = '#';
                }
            });
        });
    </script>

    <script src="https://d3e54v103j8qbb.cloudfront.net/js/jquery-3.5.1.min.dc5e7f18c8.js"></script>
    <script src="js/main.js"></script>

</body>
</html>
