<!DOCTYPE html>
<html lang="nb">
<head>
    <meta charset="utf-8">
    <title>Cleanzone | Rent har fått en ny betydning</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    
    <link href="css/style.css" rel="stylesheet" type="text/css">

    <style>
        /* Reset and Base Styles */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            font-family: 'Red Hat Display', sans-serif;
            overflow: hidden; /* Keeps the focus on the hero video */
        }

        /* Hero Container */
        .page-wrapper {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        .hero-video-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Background Video */
        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        /* Navigation / Header */
        nav {
            position: absolute;
            top: 0;
            width: 100%;
            /* Increased padding to simulate a zoomed-out, airy feel */
            padding: 60px 100px; 
            z-index: 10;
            box-sizing: border-box;
            display: flex;
            justify-content: flex-start;
        }

        nav img {
            /* Smaller logo for the 25% zoomed look */
            width: 100px; 
            height: auto;
            display: block;
        }

        /* Main Content Scaling */
        .hero-content {
            position: relative;
            z-index: 5;
            text-align: center;
            color: #fff;
            width: 100%;
            
            /* The 25% Reduction Fix */
            transform: scale(0.75); 
            transform-origin: center;
        }

        h1 {
            /* Using Clamp to ensure it never gets too big on small screens */
            font-size: clamp(1.5rem, 5vh, 3rem);
            font-weight: 700; /* Slightly lighter for elegance */
            line-height: 1.2;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            filter: drop-shadow(0px 4px 10px rgba(0,0,0,0.3));
        }

        /* Webflow/Wget Visibility Overrides */
        .cleanzone-body, 
        .page-wrapper, 
        .hero-video-container, 
        h1 {
            opacity: 1 !important;
            visibility: visible !important;
            display: flex !important;
        }
    </style>
</head>
<body class="cleanzone-body">

    <div class="page-wrapper">
        <div class="hero-video-container">
            
            <video autoplay loop muted playsinline poster="img/background-image.svg">
                <source src="video/hero.mp4" type="video/mp4">
            </video>

            <nav>
                <img src="img/66fc02b0897b4839d4162d10_Cleanzone_hvit.svg" alt="Cleanzone Logo">
            </nav>

            <div class="hero-content">
                <h1>Rent har fått en<br>ny betydning.</h1>
            </div>

        </div>
    </div>

    <script src="https://d3e54v103j8qbb.cloudfront.net/js/jquery-3.5.1.min.dc5e7f18c8.js" type="text/javascript"></script>
    <script src="js/main.js" type="text/javascript"></script>

</body>
</html>
