<!DOCTYPE html>
<html lang="nb">
<head>
    <meta charset="utf-8">
    <title>Cleanzone | Full Site</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="css/style.css" rel="stylesheet" type="text/css">
    <style>
        /* This is the magic that zooms out the WHOLE page */
        html {
            background-color: #000;
            /* Fixes the white bar on the right when zooming */
            overflow-x: hidden; 
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            /* Global 75% Zoom */
            zoom: 0.75; 
            -moz-transform: scale(0.75); 
            -moz-transform-origin: 0 0;
            /* Compensate width for the scale: 1 / 0.75 = 133.33% */
            width: 133.33%; 
        }

        /* Hero fix to ensure it stays full screen height */
        .hero-video-container {
            position: relative;
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        video {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        nav {
            position: absolute;
            top: 0; width: 100%; padding: 60px 100px;
            z-index: 10; box-sizing: border-box;
        }

        /* Make sure all original sections are visible */
        .cleanzone-body, .page-wrapper, section, .section, div {
            opacity: 1 !important;
            visibility: visible !important;
        }
    </style>
</head>
<body class="cleanzone-body">

    <div class="page-wrapper">
        <div class="hero-video-container">
            <video autoplay loop muted playsinline>
                <source src="video/hero.mp4" type="video/mp4">
            </video>
            <nav>
                <img src="img/66fc02b0897b4839d4162d10_Cleanzone_hvit.svg" style="width: 140px;" alt="Logo">
            </nav>
            <div style="position:relative; z-index:5; text-align:center; color:#fff;">
                <h1 style="font-size:5rem; font-weight:800; text-transform:uppercase;">Rent har fått en<br>ny betydning.</h1>
            </div>
        </div>

        <div class="content-from-original-site">
             </div>

    </div>

    <script src="https://d3e54v103j8qbb.cloudfront.net/js/jquery-3.5.1.min.dc5e7f18c8.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
